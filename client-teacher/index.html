<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOMO Teacher</title>
    <link rel="stylesheet" href="/teacher/styles.css" />
  </head>
  <body>
    <div class="teacher-shell">
      <section class="screen screen-code" id="code-view">
        <div class="top-bar">
          <button class="back-button" id="code-back" aria-label="Back">
            ←
          </button>
        </div>

        <div class="hero-card">
          <div class="hero-copy">
            <h1>Start your momo session!</h1>
            <p>Share this code!</p>
          </div>

          <div class="hero-code-card">
            <span id="session-code">----</span>
          </div>

          <div class="hero-actions">
            <button id="copy-btn" class="button button-primary">Copy</button>
            <button id="refresh-btn" class="button button-secondary">
              Refresh
            </button>
          </div>

          <button id="next-btn" class="button button-next">Next</button>
        </div>
      </section>

      <section class="screen screen-waiting hidden" id="waiting-view">
        <div class="waiting-panel">
          <div class="waiting-header">
            <button class="back-button" id="waiting-back" aria-label="Back">
              ←
            </button>
            <div class="waiting-banner">
              <span>Session Code :</span>
              <strong id="waiting-code">----</strong>
            </div>
          </div>

          <p class="waiting-title">Students are joining</p>
          <div class="waiting-status">
            <span class="status-label">
              <strong id="waiting-count">0</strong> Students connected
            </span>
          </div>

          <div class="waiting-students" id="waiting-students">
            <span class="student-chip">No students yet</span>
          </div>

          <button id="start-btn" class="button button-start">
            Start activity
          </button>
        </div>
      </section>

      <section class="screen screen-control hidden" id="control-view">
        <div class="control-header">
          <button class="back-button" id="control-back" aria-label="Back">
            ←
          </button>
          <h1>Control panel</h1>
        </div>

        <div class="control-grid">
          <article class="card card-preview">
            <div class="card-title">Canvas Preview</div>
            <div class="preview-grid" id="canvas-preview-grid"></div>
          </article>

          <article class="card card-message">
            <div class="card-title">Group message</div>
            <div class="message-form">
              <input
                id="message-input"
                type="text"
                placeholder="Write a message"
              />
              <button id="send-btn" class="button button-primary">Send</button>
            </div>
            <div class="message-log" id="message-log">
              <p class="empty-state">No messages sent yet.</p>
            </div>
          </article>

          <article class="card card-students">
            <div class="card-title">Students</div>
            <div class="students-header">
              <span id="students-count">0</span>
            </div>
            <div id="students" class="students-list">
              <p class="empty-state">Aún no hay estudiantes conectados.</p>
            </div>
          </article>

          <article class="card card-timer">
            <div class="card-title">Time remaining</div>
            <div class="timer-track">
              <div class="timer-progress" id="timer-progress"></div>
            </div>
            <div class="timer-value" id="time-remaining">00:00</div>
          </article>
        </div>

        <div class="control-actions">
          <button id="add-minute-btn" class="button button-secondary">
            + Add minute
          </button>
          <button id="end-btn" class="button button-end">End session</button>
        </div>
      </section>
    </div>

    <script type="module" src="/teacher/src/app.js"></script>
  </body>
</html>
